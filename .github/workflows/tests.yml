name: tests
on:
  push:
  pull_request:
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/test_semantics.py tests/test_chimera.py
      - run: python -m py_compile $(find src demos experiments research -name '*.py')
